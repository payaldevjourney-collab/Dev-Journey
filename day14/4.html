<script>
    // 1. save write data 
    localStorage.setItem("name","love")
    localStorage.setItem("id",23)

    localStorage.setItem("hobby",JSON.stringify([1,2,3]))

    // 2. get Read

    let nm = JSON.parse(localStorage.getItem("name"));
    console.log(nm[1],typeof nm);

    // 3. remove / delete key value pair 

    localStorage.removeItem("name")

    // 4. clear 
    localStorage.clear()
</script>
