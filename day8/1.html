<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>College Event Registration 📝</h1>
    <form action="">
        <label for="name">Your Name :</label>
        <input type="text" id="name" name="name" placeholder="Enter your name">
        <br><br>

        <label for="email">Email :</label>
        <input type="email" id="email" name="email" placeholder="Enter your email">
        <br><br>

        <label for="age">Age :</label>
        <input type="text" id="age" name="age" placeholder="Enter your age">
        <br><br>

        <p>Select Event Category :</p>
        <input type="checkbox" id="checkbox" name="coding">
        <label for="coding">Coding Hackrathon 💻</label><br>
        <input type="checkbox" id="checkbox" name="debate">
        <label for="debate">Debate competition 🎤</label><br>
        <input type="checkbox" id="checkbox" name="sports">
        <label for="sports">Sports Tournament ⚽</label><br>
        <br><br>

        <label for="date">Event Date :</label>
        <input type="date" id="date" name="date">
        <br><br>

        <label for="time">Preferred Time Slot :</label>
        <input type="time" id="time" name="time">
        <br><br>

        <button>Register Now</button>


       

    </form>
</body>
</html>
