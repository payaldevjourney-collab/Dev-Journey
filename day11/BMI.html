<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>
    <h1>Calculate your BMI</h1>
    <P>Enter your weight and height below to check your BMI results</P>
    <label for="weight">Put your weight in here (KG)</label><br>
    <input type="number" name="weight" id="weight">
    <br><br>
    <label for="height">Put your height in here (CM)</label><br>
    <input type="number" name="height" id="height">
    <br><br>
    <button onclick="showBMI()">Calculate BMI</button>
    <br>
    <h4 id="result"></h4>
</body>
</html>
<script>
    function showBMI(){
        const  weight = Number(document.getElementById("weight").value);
        const  height = Number(document.getElementById("height").value)/ 100;
        const bmi = (weight) / (height * height)
        let condition;
            if (bmi <= 18.4){ 
                condition = "Underweight"
            }
            else if (bmi >= 18.5 &&  bmi <= 24.9){
                condition= "NormalWeight"
            }
            else if (bmi >= 25 && bmi <= 29.9){
                condition= "Overweight"
            }
            else{
                condition= "Obese"
            }

        const head = document.getElementById("result")
        head.innerText= `Your BMI is ${bmi} which means you are ${condition}`        

    }

</script>
