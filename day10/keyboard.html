<!DOCTYPE html>
<html>

<head>
    <title>Keyboard Layout</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f2f2f2;
            font-family:Georgia, serif;
        }

        h1{
            text-align:center;
            margin:20px 0;
            font-size:50px;
        }

        .keyboard{
            width:85%;
            margin:auto;
            padding:20px;

            background:white;
            border:1px solid #d8d8d8;
            border-radius:15px;
        }

        .row{
            display:flex;
            gap:12px;
            margin-bottom:12px;
        }

        .key{
            height:80px;
            min-width:80px;

            display:flex;
            justify-content:center;
            align-items:center;

            background:#ececec;
            border-radius:12px;

            font-size:20px;

            box-shadow: insert 0 0 12px rgba(0,0,0,0.08);

            cursor:pointer;
        }


        .delete{
            width:150px;
        }

        .tab{
            width:150px;
        }

        .caps{
            width:150px;
        }

        .enter{
            width:170px;
            font-weight:bold;
            color:#1f3f5a;
        }

        .shift{
            width:170px;
            font-weight:bold;
            color:#1f3f5a;
        }

        .space{
            width:500px;
            font-weight:bold;
            color:#1f3f5a;
        }

    </style>

</head>

<body>

    <h1>CT Calculator Task</h1>

    <div class="keyboard">


        <div class="row">

            <div class="key">~</div>
            <div class="key">1</div>
            <div class="key">2</div>
            <div class="key">3</div>
            <div class="key">4</div>
            <div class="key">5</div>
            <div class="key">6</div>
            <div class="key">7</div>
            <div class="key">8</div>
            <div class="key">9</div>
            <div class="key">0</div>
            <div class="key delete">Delete</div>

        </div>



        <div class="row">

            <div class="key tab">Tab</div>
            <div class="key">Q</div>
            <div class="key">W</div>
            <div class="key">E</div>
            <div class="key">R</div>
            <div class="key">T</div>
            <div class="key">Y</div>
            <div class="key">U</div>
            <div class="key">I</div>
            <div class="key">O</div>
            <div class="key">P</div>
            <div class="key">\</div>

        </div>



        <div class="row">

            <div class="key caps">Caps</div>
            <div class="key">A</div>
            <div class="key">S</div>
            <div class="key">D</div>
            <div class="key">F</div>
            <div class="key">G</div>
            <div class="key">H</div>
            <div class="key">J</div>
            <div class="key">K</div>
            <div class="key">L</div>
            <div class="key enter">Enter</div>

        </div>



        <div class="row">

            <div class="key shift">Shift</div>
            <div class="key">Z</div>
            <div class="key">X</div>
            <div class="key">C</div>
            <div class="key">V</div>
            <div class="key">B</div>
            <div class="key">N</div>
            <div class="key">M</div>
            <div class="key">&lt;</div>
            <div class="key">&gt;</div>
            <div class="key shift">Shift</div>

        </div>



        <div class="row">

            <div class="key">Windows</div>
            <div class="key">ctrl</div>
            <div class="key">Options</div>
            <div class="key">Alt</div>

            <div class="key space">Space</div>

            <div class="key">alt</div>
            <div class="key">Option</div>
            <div class="key">&lt;</div>
            <div class="key">&gt;</div>

        </div>

    </div>

</body>

</html>
